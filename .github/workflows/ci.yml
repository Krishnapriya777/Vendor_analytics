name: CI Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pipeline
        run: |
          python src/pipeline/run_pipeline.py

      - name: Run tests
        run: |
          pytest tests/ -v git remote add origin https://github.com/Krishnapriya777/vendor_performance_analytics_gst.git